# netlify.toml — Security headers, SPA routing, build config

[build]
  command = "npm run build"
  publish = "dist"

# ── SPA fallback — all routes serve index.html ──────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers on every response ──────────────────────────
[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# ── Long-term cache for hashed Vite assets ──────────────────────
[[headers]]
  for = "/assets/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"

  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── No-cache for HTML (always fresh) ────────────────────────────
[[headers]]
  for = "/*.html"

  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
