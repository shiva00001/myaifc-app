<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Page Not Found — AIFC Transport</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f1f5f9;color:#1e293b;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .box{background:#fff;border:1px solid #e2e8f0;border-radius:1rem;
         padding:2.5rem 2rem;text-align:center;max-width:420px;width:100%}
    .icon{font-size:3rem;margin-bottom:1rem}
    h1{font-size:1.25rem;font-weight:700;margin-bottom:.5rem}
    p{font-size:.875rem;color:#64748b;margin-bottom:1.5rem;line-height:1.6}
    a{display:inline-block;background:#2563eb;color:#fff;padding:.6rem 1.5rem;
      border-radius:.5rem;font-size:.875rem;font-weight:500;text-decoration:none}
    a:hover{background:#1d4ed8}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🚚</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Dashboard</a>
  </div>
</body>
</html>
